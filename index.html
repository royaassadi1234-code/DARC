<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Druz Text Search</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="logos/druz-logo-source-smoke-fire-altar-page-colors.png">
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="page-title">
        <header class="masthead">
          <a class="site-logo" href="index.html" aria-label="Druz home">
            <img src="logos/druz-logo-source-smoke-fire-altar-page-colors.png" alt="">
          </a>
          <div class="masthead-title">
            <p class="eyebrow">Research workspace</p>
            <h1 id="page-title">Parallel Text Search</h1>
          </div>
          <div class="header-actions">
            <nav class="site-nav" aria-label="Research pages">
              
              <details class="nav-menu">
                <summary>Trans.</summary>
                <div class="nav-menu-list">
                  <a href="trans.html?text=dd">DD</a>
                  <a href="trans.html?text=py">PY</a>
                  <a href="trans.html?text=wz">WZ</a>
                  <a href="trans.html?text=nm">NM</a>
                </div>
              </details>
              <a class="active" href="index.html">Text search</a>
              <a href="diagram.html">Diagram</a>
              <a href="themes.html">Themes</a>
              <details class="nav-menu">
                <summary>word matches</summary>
                <div class="nav-menu-list">
                  <a href="pseudo.html">DD vs PY</a>
                  <a href="dd-wz.html">DD vs WZ</a>
                  <a href="py-wz.html">PY vs WZ</a>
                  <a href="dd-py-wz.html">DD vs PY vs WZ</a>
                </div>
              </details>
              <details class="nav-menu">
                <summary>phrase matches</summary>
                <div class="nav-menu-list">
                  <a href="dd-py-phrases.html">DD vs PY</a>
                  <a href="dd-wz-phrases.html">DD vs WZ</a>
                  <a href="py-wz-phrases.html">PY vs WZ</a>
                  <a href="dd-py-wz-phrases.html">DD vs PY vs WZ</a>
                </div>
              </details>
              <a href="resources.html">Resources</a>
              <a href="about.html">about</a>
            </nav>
            <div class="status" id="load-status">Loading texts...</div>
          </div>
        </header>

        <section class="search-panel" aria-label="Search controls">
          <label class="search-box" for="query">
            <span>Search word or variants</span>
            <input id="query" type="search" placeholder="Type plain letters or several words: dewan ohrmazd" autocomplete="off" autofocus>
          </label>

          <div class="controls" role="group" aria-label="Search options">
            <label class="control">
              <input id="variant-search" type="checkbox" checked>
              <span>Multiple words and variants</span>
            </label>
            <label class="control">
              <input id="whole-word" type="checkbox" checked>
              <span>Whole word</span>
            </label>
            <label class="control">
              <input id="case-sensitive" type="checkbox">
              <span>Case sensitive</span>
            </label>
            <label class="select-control" for="context-size">
              <span>Context</span>
              <select id="context-size">
                <option value="1">Short</option>
                <option value="2" selected>Medium</option>
                <option value="4">Wide</option>
              </select>
            </label>
            <button class="copy-button" id="copy-results" type="button" disabled>Copy results</button>
          </div>
        </section>

        <section class="overview" id="overview" aria-label="Text overview"></section>
        <section class="results" id="results" aria-live="polite"></section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
