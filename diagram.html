<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Attestation Diagram</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="page-title">
        <header class="masthead">
          <div>
            <p class="eyebrow">Diagram comparison</p>
            <h1 id="page-title">Attestation Diagram</h1>
          </div>
          <div class="header-actions">
            <nav class="site-nav" aria-label="Research pages">
              <a href="index.html">Text search</a>
              <a class="active" href="diagram.html">Diagram</a>
              <a href="themes.html">Themes</a>
              <details class="nav-menu">
                <summary>word matches</summary>
                <div class="nav-menu-list">
                  <a href="pseudo.html">DD vs PY</a>
                  <a href="dd-wz.html">DD vs WZ</a>
                  <a href="py-wz.html">PY vs WZ</a>
                  <a href="dd-py-wz.html">DD vs PY vs WZ</a>
                </div>
              </details>
              <details class="nav-menu">
                <summary>phrase matches</summary>
                <div class="nav-menu-list">
                  <a href="dd-py-phrases.html">DD vs PY</a>
                  <a href="dd-wz-phrases.html">DD vs WZ</a>
                  <a href="py-wz-phrases.html">PY vs WZ</a>
                  <a href="dd-py-wz-phrases.html">DD vs PY vs WZ</a>
                </div>
              </details>
              <a href="resources.html">Resources</a>
              <a href="about.html">about</a>
            </nav>
            <div class="status" id="diagram-status">Loading texts...</div>
          </div>
        </header>

        <section class="search-panel diagram-controls" aria-label="Diagram search controls">
          <label class="search-box" for="diagram-query">
            <span>Search word or words</span>
            <input id="diagram-query" type="search" placeholder="Type plain letters or several words: druz ohrmazd" autocomplete="off" autofocus>
          </label>

          <div class="controls" role="group" aria-label="Diagram options">
            <label class="control">
              <input id="diagram-multiple" type="checkbox" checked>
              <span>Multiple words</span>
            </label>
            <label class="control">
              <input id="diagram-whole-word" type="checkbox" checked>
              <span>Whole word</span>
            </label>
            <label class="control">
              <input id="diagram-case-sensitive" type="checkbox">
              <span>Case sensitive</span>
            </label>
          </div>
        </section>

        <section class="diagram-tool" id="diagram-tool" aria-live="polite"></section>
      </section>
    </main>

    <script src="diagram.js"></script>
  </body>
</html>
