<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thematic Comparison</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="page-title">
        <header class="masthead">
          <div>
            <p class="eyebrow">Systematic theme analysis</p>
            <h1 id="page-title">Thematic Comparison</h1>
          </div>
          <div class="header-actions">
            <nav class="site-nav" aria-label="Research pages">
              <a href="index.html">Text search</a>
              <a href="diagram.html">Diagram</a>
              <a class="active" href="themes.html">Themes</a>
              <a href="network.html">Network</a>
              <details class="nav-menu">
                <summary>word matches</summary>
                <div class="nav-menu-list">
                  <a href="pseudo.html">DD vs PY</a>
                  <a href="dd-wz.html">DD vs WZ</a>
                  <a href="py-wz.html">PY vs WZ</a>
                  <a href="dd-py-wz.html">DD vs PY vs WZ</a>
                </div>
              </details>
              <details class="nav-menu">
                <summary>phrase matches</summary>
                <div class="nav-menu-list">
                  <a href="dd-py-phrases.html">DD vs PY</a>
                  <a href="dd-wz-phrases.html">DD vs WZ</a>
                  <a href="py-wz-phrases.html">PY vs WZ</a>
                  <a href="dd-py-wz-phrases.html">DD vs PY vs WZ</a>
                </div>
              </details>
              <a href="resources.html">Resources</a>
              <a href="about.html">about</a>
            </nav>
            <div class="status" id="theme-status">Loading themes...</div>
          </div>
        </header>

        <section class="search-panel theme-controls" aria-label="Theme controls">
          <label class="select-control" for="theme-select">
            <span>Theme</span>
            <select id="theme-select"></select>
          </label>

          <label class="search-box" for="theme-keywords">
            <span>Theme keywords</span>
            <input id="theme-keywords" type="search" autocomplete="off">
          </label>

          <div class="controls" role="group" aria-label="Theme options">
            <label class="control">
              <input id="theme-whole-word" type="checkbox" checked>
              <span>Whole word</span>
            </label>
            <label class="control">
              <input id="theme-case-sensitive" type="checkbox">
              <span>Case sensitive</span>
            </label>
            <label class="select-control" for="theme-context">
              <span>Context</span>
              <select id="theme-context">
                <option value="1">Short</option>
                <option value="2" selected>Medium</option>
                <option value="4">Wide</option>
              </select>
            </label>
          </div>
        </section>

        <section class="theme-overview" id="theme-overview" aria-label="Theme overview"></section>
        <section class="theme-comparison" id="theme-comparison" aria-live="polite"></section>
      </section>
    </main>

    <script src="themes.js"></script>
  </body>
</html>
