<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Comparative Concept Map</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="page-title">
        <header class="masthead">
          <div>
            <p class="eyebrow">Comparative concept analysis</p>
            <h1 id="page-title">Druz and Ahreman</h1>
          </div>
          <div class="header-actions">
            <nav class="site-nav" aria-label="Research pages">
              <details class="nav-menu">
                <summary>Trans.</summary>
                <div class="nav-menu-list">
                  <a href="trans.html?text=dd">DD</a>
                  <a href="trans.html?text=py">PY</a>
                  <a href="trans.html?text=wz">WZ</a>
                  <a href="trans.html?text=nm">NM</a>
                </div>
              </details>
              <a href="index.html">Text search</a>
              <a href="diagram.html">Diagram</a>
              <a href="themes.html">Themes</a>
              <a class="active" href="concept-map.html">Concept map</a>
              <details class="nav-menu">
                <summary>word matches</summary>
                <div class="nav-menu-list">
                  <a href="pseudo.html">DD vs PY</a>
                  <a href="dd-wz.html">DD vs WZ</a>
                  <a href="py-wz.html">PY vs WZ</a>
                  <a href="dd-py-wz.html">DD vs PY vs WZ</a>
                </div>
              </details>
              <details class="nav-menu">
                <summary>phrase matches</summary>
                <div class="nav-menu-list">
                  <a href="dd-py-phrases.html">DD vs PY</a>
                  <a href="dd-wz-phrases.html">DD vs WZ</a>
                  <a href="py-wz-phrases.html">PY vs WZ</a>
                  <a href="dd-py-wz-phrases.html">DD vs PY vs WZ</a>
                </div>
              </details>
              <a href="resources.html">Resources</a>
              <a href="about.html">About</a>
            </nav>
            <div class="status" id="concept-status">Loading concepts...</div>
          </div>
        </header>

        <section class="search-panel concept-controls" aria-label="Concept map controls">
          <label class="select-control" for="concept-select">
            <span>Concept</span>
            <select id="concept-select"></select>
          </label>

          <label class="select-control" for="concept-view">
            <span>View</span>
            <select id="concept-view">
              <option value="mind">Mind map</option>
              <option value="network">Network graph</option>
              <option value="frequency">Frequency chart</option>
              <option value="context">Context map</option>
            </select>
          </label>

          <label class="select-control" for="concept-color">
            <span>Color coding</span>
            <select id="concept-color">
              <option value="concept">Same concept</option>
              <option value="meaning">Different meanings</option>
            </select>
          </label>

          <label class="select-control" for="concept-window">
            <span>Near words</span>
            <select id="concept-window">
              <option value="5" selected>5 words</option>
              <option value="8">8 words</option>
              <option value="12">12 words</option>
            </select>
          </label>
        </section>

        <section class="concept-summary" id="concept-summary" aria-label="Concept summary"></section>
        <section class="concept-stage" id="concept-stage" aria-live="polite"></section>
      </section>
    </main>

    <script src="concept-map.js"></script>
  </body>
</html>
