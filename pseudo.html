<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DD vs PY Matches</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="page-title">
        <header class="masthead">
          <div>
            <p class="eyebrow">Pseudo-dynamic comparison</p>
            <h1 id="page-title">DD vs PY Matches</h1>
          </div>
          <div class="header-actions">
            <nav class="site-nav" aria-label="Research pages">
              <a href="index.html">Text Search</a>
              <a class="active" href="pseudo.html">DD vs PY Matches</a>
            </nav>
            <div class="status" id="pseudo-status">Loading matches...</div>
          </div>
        </header>

        <section class="search-panel pseudo-controls" aria-label="Match controls">
          <label class="search-box" for="pseudo-query">
            <span>Search shared words or previews</span>
            <input id="pseudo-query" type="search" placeholder="Type shared words, sentence range, or paragraph text" autocomplete="off" autofocus>
          </label>

          <div class="controls" role="group" aria-label="Match filters">
            <label class="select-control" for="tier-filter">
              <span>Tier</span>
              <select id="tier-filter">
                <option value="">All</option>
              </select>
            </label>
            <label class="select-control" for="sort-mode">
              <span>Sort</span>
              <select id="sort-mode">
                <option value="rank">Rank</option>
                <option value="score">Score</option>
                <option value="shared">Shared words</option>
              </select>
            </label>
            <button class="action-button" id="expand-all" type="button">Expand</button>
            <button class="action-button secondary" id="collapse-all" type="button">Collapse</button>
          </div>
        </section>

        <section class="pseudo-summary" id="pseudo-summary" aria-label="Match summary"></section>
        <section class="pseudo-gallery" id="pseudo-gallery" aria-live="polite"></section>
      </section>
    </main>

    <script src="pseudo.js"></script>
  </body>
</html>
